name: Security

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: run bandit
        run: |
          # -r => Recursive scanning ; -ll => only med and high vulns.
          bandit -r . -ll

      - name: run safety
        run: |
          # scan requirements.txt and find vulnerable libs
          safety check -r requirements.txt
